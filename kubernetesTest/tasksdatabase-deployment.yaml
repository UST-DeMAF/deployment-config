apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Windows\system32\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: tasksdatabase
  name: tasksdatabase
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: tasksdatabase
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Windows\system32\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: tasksdatabase
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: tasks
            - name: POSTGRES_PASSWORD
              value: tad
            - name: POSTGRES_USER
              value: tad
          image: postgres:14.2
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tad
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          name: tasksdatabase
          ports:
            - containerPort: 5432
              protocol: TCP
      hostname: tasksdatabase
      restartPolicy: Always
