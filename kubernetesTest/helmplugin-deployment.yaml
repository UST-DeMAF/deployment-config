apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Windows\system32\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: helmplugin
  name: helmplugin
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: helmplugin
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Windows\system32\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: helmplugin
    spec:
      containers:
        - env:
            - name: ANALYSIS_MANAGER_PLUGIN_REGISTRATION_URL
              value: http://analysismanager:8080/plugin-registration
            - name: KUBE_OUTPUT_DIRECTORY
              value: /usr/share/helmTemplates
            - name: MODELS_SERVICE_URL
              value: http://modelsservice:8081
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
          image: ghcr.io/ust-demaf/helm-plugin:latest
          livenessProbe:
            exec:
              command:
                - curl -fs http://localhost:8086/actuator/health | grep 'UP' || exit 1
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          name: helmplugin
          ports:
            - containerPort: 8086
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/share
              name: demaf
            - mountPath: /usr/local/bin/helm
              name: helmplugin-cm1
              subPath: helm
      hostname: helmplugin
      restartPolicy: Always
      volumes:
        - name: demaf
          persistentVolumeClaim:
            claimName: demaf
        - configMap:
            items:
              - key: helm
                path: helm
            name: helmplugin-cm1
          name: helmplugin-cm1
