apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Windows\system32\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: modelsservice
  name: modelsservice
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: modelsservice
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Windows\system32\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: modelsservice
    spec:
      containers:
        - env:
            - name: SPRING_DATA_MONGODB_DATABASE
              value: modelsdatabase
            - name: SPRING_DATA_MONGODB_HOST
              value: modelsdatabase
            - name: SPRING_DATA_MONGODB_PASSWORD
              value: tad
            - name: SPRING_DATA_MONGODB_PORT
              value: "27017"
            - name: SPRING_DATA_MONGODB_USERNAME
              value: tad
            - name: TADM_OUTPUT_DIRECTORY
              value: /usr/share/tadms
          image: ghcr.io/ust-demaf/models-service:latest
          livenessProbe:
            exec:
              command:
                - curl -fs http://localhost:8081/actuator/health | grep 'UP' || exit 1
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          name: modelsservice
          ports:
            - containerPort: 8081
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/share
              name: demaf
      hostname: modelsservice
      restartPolicy: Always
      volumes:
        - name: demaf
          persistentVolumeClaim:
            claimName: demaf
