apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Windows\system32\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: ansibleplugin
  name: ansibleplugin
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ansibleplugin
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Windows\system32\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: ansibleplugin
    spec:
      containers:
        - env:
            - name: ANALYSIS_MANAGER_PLUGIN_REGISTRATION_URL
              value: http://analysismanager:8080/plugin-registration
            - name: MODELS_SERVICE_URL
              value: http://modelsservice:8081
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
          image: ghcr.io/ust-demaf/ansible-mps-plugin:latest
          livenessProbe:
            exec:
              command:
                - curl -fs http://localhost:8087/actuator/health | grep 'UP' || exit 1
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          name: ansibleplugin
          ports:
            - containerPort: 8087
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/share
              name: demaf
      hostname: ansibleplugin
      restartPolicy: Always
      volumes:
        - name: demaf
          persistentVolumeClaim:
            claimName: demaf
