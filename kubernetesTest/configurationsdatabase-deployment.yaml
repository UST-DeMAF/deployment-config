apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Windows\system32\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: configurationsdatabase
  name: configurationsdatabase
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: configurationsdatabase
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Windows\system32\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: configurationsdatabase
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: configurations
            - name: POSTGRES_PASSWORD
              value: tad
            - name: POSTGRES_USER
              value: tad
          image: postgres:14.2
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - tad
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          name: configurationsdatabase
          ports:
            - containerPort: 5432
              protocol: TCP
      hostname: configurationsdatabase
      restartPolicy: Always
