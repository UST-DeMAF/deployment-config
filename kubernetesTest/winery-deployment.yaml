apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Windows\system32\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: winery
  name: winery
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: winery
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Windows\system32\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: winery
    spec:
      containers:
        - env:
            - name: PUBLIC_HOSTNAME
              value: localhost
            - name: WINERY_FEATURE_RADON
              value: "true"
            - name: WINERY_REPOSITORY_PROVIDER
              value: yaml
          image: opentosca/radon-gmt:latest
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - http://localhost:8080/
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          name: winery
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - mountPath: /var/repository
              name: winery
      restartPolicy: Always
      volumes:
        - name: winery
          persistentVolumeClaim:
            claimName: winery
