apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Windows\system32\kompose.exe convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: modelsdatabase
  name: modelsdatabase
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: modelsdatabase
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Windows\system32\kompose.exe convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: modelsdatabase
    spec:
      containers:
        - env:
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: tad
            - name: MONGO_INITDB_ROOT_USERNAME
              value: tad
          image: mongo:5.0.6
          livenessProbe:
            exec:
              command:
                - mongo
                - --eval
                - db.adminCommand('ping')
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 5
          name: modelsdatabase
          ports:
            - containerPort: 27017
              protocol: TCP
      hostname: modelsdatabase
      restartPolicy: Always
